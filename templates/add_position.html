<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Position</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .form-container {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 14px;
      margin-bottom: 6px;
      color: #333;
    }

    input, textarea {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }

    input:focus, textarea:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 0 3px rgba(74,144,226,0.15);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .row .form-group {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #3a7bd5;
    }

    .hint {
      font-size: 12px;
      color: #777;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <form class="form-container" method="post" enctype="multipart/form-data">
    <h1>Додати позицію</h1>

    <div class="form-group">
      <label for="name">Назва</label>
      <input id="name" type="text" name="name" required placeholder="Наприклад: Піца Маргарита" />
    </div>

    <div class="form-group">
      <label for="desc">Опис</label>
      <textarea id="desc" name="desc" required placeholder="Короткий опис страви"></textarea>
    </div>

    <div class="form-group">
      <label for="image">Зображення</label>
      <input id="image" type="file" name="image" accept="image/*" required />
      <div class="hint">JPG, PNG або WEBP</div>
    </div>

    <div class="row">
      <div class="form-group">
        <label for="time">Час (хв)</label>
        <input id="time" type="number" name="time" min="1" required />
      </div>

      <div class="form-group">
        <label for="cost">Вартість ($)</label>
        <input id="cost" type="number" name="cost" min="0" step="0.01" required />
      </div>
    </div>

    <button type="submit">Зберегти</button>
  </form>
</body>
</html>
